<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Game</title>
<link rel="stylesheet" href="game.css">
</head>

<body>
<div id="battle-area">
    <h1>Battle Arena</h1>
    <div id="coin-drop" class="damage"></div>

    <div id="fighters">
        <div id="character" class="fighter">
            <div class="health-bar">
                <div id="player-health-bar" class="health-fill"></div>
            </div>
            <img src="photos/mainCharacter/mainCharacter.png" alt="mainCharacter">
            <div class="damage" id="player-damage"></div>
        </div>

        <div id="enemy" class="fighter">
            <div class="health-bar">
                <div id="enemy-health-bar" class="health-fill"></div>
            </div>
            <img id="enemy-img" src="photos/Enemies/67.png" alt="enemy">
            <div class="damage" id="enemy-damage"></div>
        </div>
    </div>

    <p id="current-fighter">Current Fighter: Player</p>
    <p id="message">Press 'P' to start the game!</p>
    <p id="coins">Coins: 0</p>
</div>

<!-- Pause Menu -->
<div id="pause-menu" class="hidden">
    <h2>⏸ Game Paused</h2>
    <div id="pause-stats">
      <!-- Stats will be filled by JS -->
    </div>
    <div id="song-options">
        <h3>Song Options</h3>
        <button onclick="changeSong('song1')">Song 1</button>
        <button onclick="changeSong('song2')">Song 2</button>
        <button onclick="changeSong('song3')">Song 3</button>
    </div>
    <p>Press 'P' to resume</p>
</div>

<!-- Weapons Shop -->
<div id="shop-area">
    <h2>⚔️ Weapon Shop</h2>
    <div id="weapons-container">
        <div class="weapon-card" data-cost="16" data-attack="12">
            <div class="weapon-name">M67 grenade</div>
            <div class="weapon-cost">💰 16</div>
        </div>
        <div class="weapon-card" data-cost="17" data-attack="14">
            <div class="weapon-name">Winchester Model 67</div>
            <div class="weapon-cost">💰 17</div>
        </div>
        <div class="weapon-card" data-cost="17" data-attack="14">
            <div class="weapon-name">Norinco type 67 machine gun</div>
            <div class="weapon-cost">💰 17</div>
        </div>
        <div class="weapon-card" data-cost="17" data-attack="14">
            <div class="weapon-name">Type 67 recoilless rifle</div>
            <div class="weapon-cost">💰 17</div>
        </div>
        <div class="weapon-card" data-cost="16" data-attack="12">
            <div class="weapon-name">HK 67</div>
            <div class="weapon-cost">💰 16</div>
        </div>
        <div class="weapon-card" data-cost="60" data-attack="76">
            <div class="weapon-name">M67 flame tank</div>
            <div class="weapon-cost">💰 67</div>
        </div>
    </div>
</div>

<script src="game.js" defer></script>
</body>
</html>
