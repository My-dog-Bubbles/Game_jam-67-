<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Game</title>
<link rel="stylesheet" href="game.css">
</head>

<body>

<div id="battle-area">
    <h1>Battle Arena</h1>
    <div id="character">🦸</div>
    <div id="enemy">👾</div>
    <p>Click to attack!</p>
</div>

<div id="shop-area">
    <h2>⚔️ Weapon Shop</h2>
    <div id="weapons-container">
        <div class="weapon-card">
            <div class="weapon-name">Sword</div>
            <div class="weapon-cost">💰 10</div>
        </div>
        <div class="weapon-card">
            <div class="weapon-name">Axe</div>
            <div class="weapon-cost">💰 25</div>
        </div>
        <div class="weapon-card">
            <div class="weapon-name">Bow</div>
            <div class="weapon-cost">💰 15</div>
        </div>
        <div class="weapon-card">
            <div class="weapon-name">Magic</div>
            <div class="weapon-cost">💰 50</div>
        </div>
    </div>
</div>

</body>
</html>
